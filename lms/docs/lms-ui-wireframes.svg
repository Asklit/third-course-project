<svg width="2200" height="1900" viewBox="0 0 2200 1900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f4f7fb; }
    .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 20; }
    .header { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 12; }
    .panel { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; rx: 12; }
    .btn { fill: #2563eb; rx: 10; }
    .btnGhost { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.5; rx: 10; }
    .input { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 8; }
    .chipOpen { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; rx: 999; }
    .chipDone { fill: #dbeafe; stroke: #2563eb; stroke-width: 1; rx: 999; }
    .chipLate { fill: #fee2e2; stroke: #dc2626; stroke-width: 1; rx: 999; }
    .title { font: 700 26px Arial, sans-serif; fill: #111827; }
    .subtitle { font: 600 18px Arial, sans-serif; fill: #1f2937; }
    .text { font: 400 15px Arial, sans-serif; fill: #374151; }
    .muted { font: 400 13px Arial, sans-serif; fill: #6b7280; }
    .small { font: 600 12px Arial, sans-serif; fill: #374151; }
    .btnText { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    .ghostText { font: 700 14px Arial, sans-serif; fill: #4338ca; }
    .sectionTitle { font: 700 20px Arial, sans-serif; fill: #111827; }
  </style>

  <rect class="bg" x="0" y="0" width="2200" height="1900"/>
  <text x="60" y="70" class="title">Прототип интерфейса LMS</text>
  <text x="60" y="100" class="text">Набор wireframe-экранов для главы "Проектирование интерфейса"</text>

  <!-- Login -->
  <rect class="frame" x="60" y="150" width="460" height="620"/>
  <text x="90" y="195" class="sectionTitle">Экран 1. Вход</text>
  <rect class="panel" x="120" y="260" width="340" height="360"/>
  <text x="150" y="305" class="small">Корпоративная LMS</text>
  <text x="150" y="345" class="title">Вход студента</text>
  <text x="150" y="395" class="text">Почта</text>
  <rect class="input" x="150" y="410" width="280" height="44"/>
  <text x="165" y="438" class="muted">student@example.com</text>
  <text x="150" y="485" class="text">Пароль</text>
  <rect class="input" x="150" y="500" width="280" height="44"/>
  <text x="165" y="528" class="muted">••••••••••••</text>
  <rect class="btn" x="150" y="575" width="280" height="48" rx="10"/>
  <text x="265" y="605" class="btnText">Войти</text>

  <!-- Assignments -->
  <rect class="frame" x="570" y="150" width="730" height="620"/>
  <text x="600" y="195" class="sectionTitle">Экран 2. Список лабораторных</text>
  <rect class="header" x="610" y="230" width="650" height="110"/>
  <text x="640" y="275" class="small">Личный кабинет студента</text>
  <text x="640" y="315" class="title">Лабораторные работы</text>
  <text x="640" y="340" class="muted">Список открытых, сданных и просроченных заданий</text>

  <rect class="panel" x="610" y="380" width="650" height="85"/>
  <rect class="chipOpen" x="635" y="405" width="95" height="28"/>
  <text x="655" y="424" class="small">Открыта</text>
  <text x="760" y="417" class="subtitle">LR01: Introduction and tooling</text>
  <text x="760" y="440" class="muted">Дедлайн: 20.03.2026 23:59</text>

  <rect class="panel" x="610" y="480" width="650" height="85"/>
  <rect class="chipDone" x="635" y="505" width="80" height="28"/>
  <text x="655" y="524" class="small">Сдана</text>
  <text x="760" y="517" class="subtitle">LR02: Data structures</text>
  <text x="760" y="540" class="muted">Отправлена, ожидает дальнейшей обработки</text>

  <rect class="panel" x="610" y="580" width="650" height="85"/>
  <rect class="chipLate" x="635" y="605" width="150" height="28"/>
  <text x="650" y="624" class="small">Сдана с опозданием</text>
  <text x="810" y="617" class="subtitle">LR03: Functions and modules</text>
  <text x="810" y="640" class="muted">Отправлена после дедлайна</text>

  <!-- Assignment details -->
  <rect class="frame" x="1350" y="150" width="790" height="760"/>
  <text x="1380" y="195" class="sectionTitle">Экран 3. Карточка задания и сдача работы</text>
  <rect class="header" x="1390" y="230" width="710" height="120"/>
  <text x="1420" y="270" class="small">Назад к заданиям</text>
  <text x="1420" y="310" class="title">LR01: Introduction and tooling</text>
  <text x="1420" y="335" class="muted">Дедлайн: 20.03.2026 23:59</text>

  <rect class="panel" x="1390" y="380" width="710" height="120"/>
  <text x="1420" y="420" class="subtitle">Статус сдачи</text>
  <text x="1420" y="450" class="text">Отчет: не загружен</text>
  <text x="1420" y="475" class="text">Код: не загружен</text>

  <rect class="panel" x="1390" y="530" width="710" height="320"/>
  <text x="1420" y="570" class="subtitle">Форма отправки</text>
  <text x="1420" y="605" class="text">1. Отчет (.docx)</text>
  <rect class="input" x="1420" y="620" width="250" height="42"/>
  <text x="1435" y="647" class="muted">Выбрать файл</text>
  <text x="1420" y="700" class="text">2. Код</text>
  <rect class="btnGhost" x="1420" y="715" width="170" height="40"/>
  <text x="1450" y="740" class="ghostText">Файлы кода</text>
  <rect class="btnGhost" x="1605" y="715" width="220" height="40"/>
  <text x="1630" y="740" class="ghostText">Ссылка на репозиторий</text>
  <rect class="input" x="1420" y="775" width="350" height="42"/>
  <text x="1435" y="802" class="muted">Комментарий к сдаче</text>
  <rect class="btn" x="1840" y="775" width="200" height="44"/>
  <text x="1882" y="803" class="btnText">Отправить работу</text>

  <!-- Wiki list / search -->
  <rect class="frame" x="60" y="840" width="1040" height="920"/>
  <text x="90" y="885" class="sectionTitle">Экран 4. Wiki и поиск по материалам</text>
  <rect class="header" x="100" y="920" width="960" height="115"/>
  <text x="130" y="960" class="small">Wiki</text>
  <text x="130" y="1000" class="title">База материалов лабораторных работ</text>
  <text x="130" y="1025" class="muted">Просмотр лабораторных и поиск нужных фрагментов по ключевым словам</text>

  <rect class="panel" x="100" y="1070" width="960" height="220"/>
  <text x="130" y="1110" class="subtitle">Открыть лабораторную целиком</text>
  <rect class="panel" x="130" y="1140" width="270" height="120"/>
  <text x="155" y="1180" class="subtitle">ЛР №1</text>
  <text x="155" y="1205" class="muted">Разделов: 8</text>
  <text x="155" y="1228" class="muted">Теги: console, csharp</text>
  <rect class="panel" x="430" y="1140" width="270" height="120"/>
  <text x="455" y="1180" class="subtitle">ЛР №2</text>
  <text x="455" y="1205" class="muted">Разделов: 6</text>
  <text x="455" y="1228" class="muted">Теги: arrays, list</text>
  <rect class="panel" x="730" y="1140" width="270" height="120"/>
  <text x="755" y="1180" class="subtitle">ЛР №3</text>
  <text x="755" y="1205" class="muted">Разделов: 7</text>
  <text x="755" y="1228" class="muted">Теги: modules, functions</text>

  <rect class="panel" x="100" y="1320" width="960" height="390"/>
  <text x="130" y="1360" class="subtitle">Поиск по материалам</text>
  <rect class="input" x="130" y="1385" width="460" height="42"/>
  <text x="145" y="1412" class="muted">Например: коллекции, console, LINQ</text>
  <rect class="input" x="610" y="1385" width="170" height="42"/>
  <text x="625" y="1412" class="muted">Лабораторная</text>
  <rect class="input" x="795" y="1385" width="120" height="42"/>
  <text x="825" y="1412" class="muted">Тег</text>
  <rect class="input" x="930" y="1385" width="100" height="42"/>
  <text x="946" y="1412" class="muted">Тип</text>
  <rect class="btn" x="130" y="1448" width="120" height="40"/>
  <text x="167" y="1474" class="btnText">Найти</text>

  <rect class="panel" x="130" y="1515" width="900" height="70"/>
  <text x="155" y="1543" class="subtitle">LR01: Introduction and tooling</text>
  <text x="155" y="1567" class="muted">Теория: Console.WriteLine используется для вывода...</text>

  <rect class="panel" x="130" y="1600" width="900" height="70"/>
  <text x="155" y="1628" class="subtitle">LR02: Data structures</text>
  <text x="155" y="1652" class="muted">Теория: Коллекции позволяют хранить наборы элементов...</text>

  <!-- Wiki lab page -->
  <rect class="frame" x="1140" y="970" width="1000" height="790"/>
  <text x="1170" y="1015" class="sectionTitle">Экран 5. Страница лабораторной в Wiki</text>
  <rect class="header" x="1180" y="1050" width="920" height="100"/>
  <text x="1210" y="1088" class="small">Назад к wiki</text>
  <text x="1210" y="1123" class="title">Лабораторная работа №1</text>

  <rect class="panel" x="1180" y="1180" width="250" height="520"/>
  <text x="1210" y="1220" class="subtitle">Навигация</text>
  <rect class="panel" x="1210" y="1245" width="190" height="42"/>
  <text x="1230" y="1271" class="text">1. Цель работы</text>
  <rect class="panel" x="1210" y="1300" width="190" height="42"/>
  <text x="1230" y="1326" class="text">2. Теория</text>
  <rect class="panel" x="1210" y="1355" width="190" height="42"/>
  <text x="1230" y="1381" class="text">3. Задание</text>
  <rect class="panel" x="1210" y="1410" width="190" height="42"/>
  <text x="1230" y="1436" class="text">4. Варианты</text>
  <rect class="panel" x="1210" y="1465" width="190" height="42"/>
  <text x="1230" y="1491" class="text">5. Вопросы</text>

  <rect class="panel" x="1460" y="1180" width="640" height="520"/>
  <text x="1490" y="1220" class="subtitle">Цель работы</text>
  <text x="1490" y="1255" class="text">Изучить базовые конструкции языка и освоить инструменты разработки.</text>
  <rect class="panel" x="1490" y="1290" width="580" height="110"/>
  <text x="1510" y="1325" class="subtitle">Теоретические сведения</text>
  <text x="1510" y="1355" class="muted">Markdown-текст, изображения, таблицы и фрагменты кода</text>
  <rect class="panel" x="1490" y="1425" width="580" height="170"/>
  <text x="1510" y="1460" class="subtitle">Блок кода</text>
  <text x="1510" y="1490" class="muted">Console.WriteLine("Hello, world!");</text>
  <rect class="btnGhost" x="1890" y="1450" width="150" height="34"/>
  <text x="1920" y="1472" class="ghostText">Копировать</text>
</svg>
